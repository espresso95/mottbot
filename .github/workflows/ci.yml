name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      TELEGRAM_BOT_TOKEN: ci-token
      CI_MASTER_KEY: ci-master-key
      CI_SQLITE_PATH: /tmp/mottbot-ci.sqlite
      MOTTBOT_CONFIG_PATH: /tmp/mottbot-ci.config.json

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native SQLite binding
        run: pnpm rebuild better-sqlite3

      - name: Create CI config
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const config = {
            telegram: {
              botToken: process.env.TELEGRAM_BOT_TOKEN,
              polling: false,
              adminUserIds: ["ci-admin"]
            },
            auth: {
              preferCliImport: false
            },
            storage: {
              sqlitePath: process.env.CI_SQLITE_PATH
            },
            dashboard: {
              enabled: false
            },
            runtime: {
              instanceLeaseEnabled: false
            },
            security: {
              masterKey: process.env.CI_MASTER_KEY
            }
          };
          fs.writeFileSync(process.env.MOTTBOT_CONFIG_PATH, JSON.stringify(config, null, 2));
          NODE

      - name: Verify
        run: pnpm verify

      - name: Validate package output
        run: |
          test -f dist/index.js
          node -e "const fs = require('node:fs'); const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); if (pkg.private !== true || pkg.bin?.mottbot !== './dist/index.js') process.exit(1)"
          node dist/index.js health

      - name: Guard against dirty generated output
        run: |
          status="$(git status --short --untracked-files=all)"
          if [ -n "$status" ]; then
            echo "$status"
            exit 1
          fi
